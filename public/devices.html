<!-- ===========================
     Custom Devices Control Panel
     Web UI for Stage Equipment Control
     =========================== -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Devices Control Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        /* ===========================
           Sidebar Navigation
           =========================== */

        .sidebar {
            background: #16213e;
            padding: 20px;
            border-right: 2px solid #0f3460;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0f3460;
        }

        .sidebar-header i {
            font-size: 28px;
            color: #00d4ff;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: bold;
        }

        .device-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .device-item {
            padding: 12px;
            background: #0f3460;
            border-left: 3px solid #00d4ff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .device-item:hover {
            background: #1a4d7a;
            transform: translateX(5px);
        }

        .device-item.active {
            background: #007399;
            border-left-color: #00ff88;
            font-weight: bold;
        }

        .device-item i {
            margin-right: 8px;
            width: 20px;
            text-align: center;
        }

        /* ===========================
           Main Content
           =========================== */

        .main-content {
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #0f3460;
        }

        .header h2 {
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* ===========================
           Device Control Cards
           =========================== */

        .control-card {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .control-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .control-card h3 {
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* ===========================
           Inputs & Controls
           =========================== */

        input[type="range"],
        input[type="color"],
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            border: 1px solid #00d4ff;
            color: #e0e0e0;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            box-shadow: 0 0 5px #00ff88;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        input[type="color"] {
            padding: 5px;
            height: 45px;
            cursor: pointer;
        }

        /* ===========================
           Buttons
           =========================== */

        button {
            padding: 10px 15px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        button.danger {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
        }

        button.danger:hover {
            background: linear-gradient(135deg, #ff6666 0%, #ff0000 100%);
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        }

        button.warning {
            background: linear-gradient(135deg, #ffaa00 0%, #ff8800 100%);
        }

        button.warning:hover {
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* ===========================
           Device Specific Styles
           =========================== */

        .moving-head-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .xy-pad {
            grid-column: 1 / -1;
            background: #0f3460;
            border: 2px solid #00d4ff;
            border-radius: 4px;
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            cursor: crosshair;
            overflow: hidden;
        }

        .xy-indicator {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ff88;
            pointer-events: none;
        }

        .value-display {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            color: #00ff88;
        }

        .preset-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 15px 0;
        }

        .preset-buttons button {
            font-size: 12px;
            padding: 8px;
        }

        /* ===========================
           Status & Notifications
           =========================== */

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            padding: 15px 20px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .notification.error {
            background: #ff4444;
            color: #fff;
        }

        .notification.warning {
            background: #ffaa00;
            color: #000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ===========================
           Responsive Design
           =========================== */

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-microchip"></i>
                <h1>Devices</h1>
            </div>
            <div class="device-list" id="deviceList"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <h2>
                    <span class="status-indicator"></span>
                    Custom Devices Control
                </h2>
                <div>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>

            <!-- Moving Head Controls -->
            <div class="control-card" id="movingHeadCard" style="display: none;">
                <h3><i class="fas fa-lightbulb"></i> Moving Head Light</h3>
                
                <div class="xy-pad" id="xyPad">
                    <div class="value-display" id="xyValue">Pan: 0° Tilt: 0°</div>
                    <div class="xy-indicator" id="xyIndicator"></div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label class="control-label">Pan (0-540°)</label>
                        <input type="range" id="panSlider" min="0" max="540" value="0">
                        <span id="panValue">0°</span>
                    </div>
                    <div class="control-group">
                        <label class="control-label">Tilt (0-270°)</label>
                        <input type="range" id="tiltSlider" min="0" max="270" value="0">
                        <span id="tiltValue">0°</span>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <label class="control-label">Intensity</label>
                        <input type="range" id="intensitySlider" min="0" max="100" value="0">
                        <span id="intensityValue">0%</span>
                    </div>
                    <div class="control-group">
                        <label class="control-label">Zoom</label>
                        <input type="range" id="zoomSlider" min="0.5" max="2" step="0.1" value="1">
                        <span id="zoomValue">1.0x</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">Color</label>
                    <input type="color" id="colorPicker" value="#ffffff">
                </div>

                <div class="control-group">
                    <label class="control-label">Strobe</label>
                    <input type="range" id="strobeSlider" min="0" max="100" value="0">
                    <span id="strobeValue">0%</span>
                </div>

                <div class="preset-buttons">
                    <button onclick="setMovingHeadPreset('red')"><i class="fas fa-circle" style="color: #ff0000;"></i> Red</button>
                    <button onclick="setMovingHeadPreset('green')"><i class="fas fa-circle" style="color: #00ff00;"></i> Green</button>
                    <button onclick="setMovingHeadPreset('blue')"><i class="fas fa-circle" style="color: #0000ff;"></i> Blue</button>
                </div>
            </div>

            <!-- RGB LED Controls -->
            <div class="control-card" id="rgbLedCard" style="display: none;">
                <h3><i class="fas fa-palette"></i> RGB LED Strip</h3>

                <div class="control-group">
                    <label class="control-label">Color</label>
                    <input type="color" id="ledColorPicker" value="#ff0000">
                </div>

                <div class="control-group">
                    <label class="control-label">Brightness</label>
                    <input type="range" id="ledBrightnessSlider" min="0" max="100" value="100">
                    <span id="ledBrightnessValue">100%</span>
                </div>

                <div class="control-group">
                    <label class="control-label">Animation Mode</label>
                    <select id="animationMode">
                        <option value="static">Static</option>
                        <option value="pulse">Pulse</option>
                        <option value="rainbow">Rainbow</option>
                        <option value="chase">Chase</option>
                        <option value="strobe">Strobe</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Animation Speed</label>
                    <input type="range" id="animationSpeedSlider" min="0.1" max="2" step="0.1" value="1">
                    <span id="animationSpeedValue">1.0x</span>
                </div>

                <div class="preset-buttons">
                    <button onclick="setRGBPreset('warm')"><i class="fas fa-fire"></i> Warm</button>
                    <button onclick="setRGBPreset('cool')"><i class="fas fa-snowflake"></i> Cool</button>
                    <button onclick="setRGBPreset('party')"><i class="fas fa-disco-ball"></i> Party</button>
                </div>
            </div>

            <!-- Pyrotechnics Controls -->
            <div class="control-card" id="pyrotechnicsCard" style="display: none;">
                <h3><i class="fas fa-explosion"></i> Pyrotechnics</h3>

                <div class="button-group">
                    <button onclick="armPyrotechnics()" class="warning"><i class="fas fa-lock"></i> Arm</button>
                    <button onclick="disarmPyrotechnics()" class="danger"><i class="fas fa-lock-open"></i> Disarm</button>
                </div>

                <div class="control-group">
                    <label class="control-label">Effect Type</label>
                    <select id="effectType">
                        <option value="explosion">Explosion</option>
                        <option value="burst">Burst</option>
                        <option value="fire">Fire</option>
                        <option value="smoke">Smoke</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">Intensity</label>
                    <input type="range" id="pyroIntensitySlider" min="0" max="100" value="50">
                    <span id="pyroIntensityValue">50%</span>
                </div>

                <button onclick="triggerPyrotechnics()" class="danger" style="width: 100%; margin-top: 10px;">
                    <i class="fas fa-bolt"></i> TRIGGER
                </button>
            </div>

            <!-- Fog Machine Controls -->
            <div class="control-card" id="fogCard" style="display: none;">
                <h3><i class="fas fa-cloud"></i> Fog Machine</h3>

                <div class="button-group">
                    <button onclick="activateFog()"><i class="fas fa-play"></i> Activate</button>
                    <button onclick="deactivateFog()" class="danger"><i class="fas fa-stop"></i> Stop</button>
                </div>

                <div class="control-group">
                    <label class="control-label">Density</label>
                    <input type="range" id="fogDensitySlider" min="0" max="100" value="50">
                    <span id="fogDensityValue">50%</span>
                </div>

                <div class="control-group">
                    <label class="control-label">Duration (seconds)</label>
                    <input type="number" id="fogDuration" value="5" min="1" max="30">
                </div>
            </div>

            <!-- Generic Controls -->
            <div class="control-card" id="genericCard" style="display: none;">
                <h3><i class="fas fa-sliders-h"></i> Generic Device</h3>

                <div class="control-group">
                    <label class="control-label">Parameter Name</label>
                    <input type="text" id="parameterName" placeholder="e.g., intensity">
                </div>

                <div class="control-group">
                    <label class="control-label">Value</label>
                    <input type="number" id="parameterValue" placeholder="e.g., 0-100">
                </div>

                <button onclick="sendGenericParameter()" style="width: 100%;">Send Parameter</button>

                <div class="control-group" style="margin-top: 15px;">
                    <label class="control-label">Effect Name</label>
                    <input type="text" id="effectName" placeholder="e.g., flash">
                </div>

                <button onclick="triggerGenericEffect()" style="width: 100%;">Trigger Effect</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ===========================
        // Custom Devices Control App
        // ===========================

        class CustomDevicesApp {
            constructor() {
                this.socket = null;
                this.selectedDevice = null;
                this.devices = {};
                this.isConnected = false;

                this.init();
            }

            init() {
                this.setupSocket();
                this.setupEventListeners();
            }

            setupSocket() {
                this.socket = io({
                    reconnection: true,
                    reconnectionDelay: 1000,
                    reconnectionAttempts: 5
                });

                this.socket.on('connect', () => this.onConnect());
                this.socket.on('disconnect', () => this.onDisconnect());
                this.socket.on('device-registered', (data) => this.onDeviceRegistered(data));
                this.socket.on('device-updated', (data) => this.onDeviceUpdated(data));
            }

            setupEventListeners() {
                // Moving Head
                document.getElementById('panSlider').addEventListener('input', (e) => {
                    document.getElementById('panValue').textContent = e.target.value + '°';
                    this.sendCommand('moving-head-pan', parseFloat(e.target.value));
                });

                document.getElementById('tiltSlider').addEventListener('input', (e) => {
                    document.getElementById('tiltValue').textContent = e.target.value + '°';
                    this.sendCommand('moving-head-tilt', parseFloat(e.target.value));
                });

                document.getElementById('intensitySlider').addEventListener('input', (e) => {
                    document.getElementById('intensityValue').textContent = e.target.value + '%';
                    this.sendCommand('moving-head-intensity', parseFloat(e.target.value));
                });

                document.getElementById('zoomSlider').addEventListener('input', (e) => {
                    document.getElementById('zoomValue').textContent = e.target.value + 'x';
                    this.sendCommand('moving-head-zoom', parseFloat(e.target.value));
                });

                document.getElementById('strobeSlider').addEventListener('input', (e) => {
                    document.getElementById('strobeValue').textContent = e.target.value + '%';
                    this.sendCommand('moving-head-strobe', parseFloat(e.target.value));
                });

                document.getElementById('colorPicker').addEventListener('change', (e) => {
                    this.sendCommand('moving-head-color', e.target.value);
                });

                // RGB LED
                document.getElementById('ledColorPicker').addEventListener('change', (e) => {
                    this.sendCommand('rgb-led-color', e.target.value);
                });

                document.getElementById('ledBrightnessSlider').addEventListener('input', (e) => {
                    document.getElementById('ledBrightnessValue').textContent = e.target.value + '%';
                    this.sendCommand('rgb-led-brightness', parseFloat(e.target.value) / 100);
                });

                document.getElementById('animationMode').addEventListener('change', (e) => {
                    this.sendCommand('rgb-led-animation', e.target.value);
                });

                document.getElementById('animationSpeedSlider').addEventListener('input', (e) => {
                    document.getElementById('animationSpeedValue').textContent = e.target.value + 'x';
                    this.sendCommand('rgb-led-speed', parseFloat(e.target.value));
                });

                // XY Pad
                document.getElementById('xyPad').addEventListener('click', (e) => {
                    this.handleXYPadClick(e);
                });
            }

            handleXYPadClick(event) {
                const pad = document.getElementById('xyPad');
                const rect = pad.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;

                const panPercent = (x / rect.width) * 100;
                const tiltPercent = (y / rect.height) * 100;

                const panAngle = (panPercent / 100) * 540;
                const tiltAngle = (tiltPercent / 100) * 270;

                document.getElementById('panSlider').value = panAngle;
                document.getElementById('tiltSlider').value = tiltAngle;

                document.getElementById('xyValue').textContent = `Pan: ${panAngle.toFixed(0)}° Tilt: ${tiltAngle.toFixed(0)}°`;
                document.getElementById('xyIndicator').style.left = x + 'px';
                document.getElementById('xyIndicator').style.top = y + 'px';

                this.sendCommand('moving-head-position', { pan: panAngle, tilt: tiltAngle });
            }

            sendCommand(command, value) {
                if (!this.selectedDevice) return;

                this.socket.emit('device-command', {
                    device: this.selectedDevice,
                    command: command,
                    value: value,
                    timestamp: Date.now()
                });
            }

            onConnect() {
                this.isConnected = true;
                document.getElementById('statusText').textContent = 'Connected';
                this.showNotification('Connected to Custom Devices Controller', 'success');
            }

            onDisconnect() {
                this.isConnected = false;
                document.getElementById('statusText').textContent = 'Disconnected';
                this.showNotification('Disconnected from server', 'error');
            }

            onDeviceRegistered(data) {
                this.devices[data.name] = data;
                this.renderDeviceList();
            }

            onDeviceUpdated(data) {
                console.log('Device updated:', data);
            }

            renderDeviceList() {
                const list = document.getElementById('deviceList');
                list.innerHTML = '';

                for (const [name, device] of Object.entries(this.devices)) {
                    const item = document.createElement('div');
                    item.className = 'device-item' + (this.selectedDevice === name ? ' active' : '');
                    item.innerHTML = `<i class="fas fa-microchip"></i> ${name}`;
                    item.addEventListener('click', () => this.selectDevice(name, device));
                    list.appendChild(item);
                }
            }

            selectDevice(name, device) {
                this.selectedDevice = name;
                this.renderDeviceList();
                this.showDeviceControls(device.type);
            }

            showDeviceControls(type) {
                document.getElementById('movingHeadCard').style.display = 'none';
                document.getElementById('rgbLedCard').style.display = 'none';
                document.getElementById('pyrotechnicsCard').style.display = 'none';
                document.getElementById('fogCard').style.display = 'none';
                document.getElementById('genericCard').style.display = 'none';

                switch (type) {
                    case 'MovingHead':
                        document.getElementById('movingHeadCard').style.display = 'block';
                        break;
                    case 'RGBLed':
                        document.getElementById('rgbLedCard').style.display = 'block';
                        break;
                    case 'Pyrotechnics':
                        document.getElementById('pyrotechnicsCard').style.display = 'block';
                        break;
                    case 'Fog':
                        document.getElementById('fogCard').style.display = 'block';
                        break;
                    default:
                        document.getElementById('genericCard').style.display = 'block';
                }
            }

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.remove();
                }, 3000);
            }
        }

        // ===========================
        // Global Functions
        // ===========================

        let app;

        window.setMovingHeadPreset = function(preset) {
            const presets = {
                'red': '#ff0000',
                'green': '#00ff00',
                'blue': '#0000ff'
            };
            document.getElementById('colorPicker').value = presets[preset];
            document.getElementById('colorPicker').dispatchEvent(new Event('change'));
        };

        window.setRGBPreset = function(preset) {
            const presets = {
                'warm': '#ffaa00',
                'cool': '#00aaff',
                'party': '#ff00ff'
            };
            document.getElementById('ledColorPicker').value = presets[preset];
            document.getElementById('ledColorPicker').dispatchEvent(new Event('change'));
        };

        window.armPyrotechnics = function() {
            app.sendCommand('pyro-arm', true);
            app.showNotification('Pyrotechnics ARMED', 'warning');
        };

        window.disarmPyrotechnics = function() {
            app.sendCommand('pyro-disarm', true);
            app.showNotification('Pyrotechnics DISARMED', 'info');
        };

        window.triggerPyrotechnics = function() {
            const effectType = document.getElementById('effectType').value;
            const intensity = parseFloat(document.getElementById('pyroIntensitySlider').value) / 100;
            app.sendCommand('pyro-trigger', { type: effectType, intensity: intensity });
            app.showNotification('Pyrotechnics TRIGGERED!', 'warning');
        };

        window.activateFog = function() {
            const density = parseFloat(document.getElementById('fogDensitySlider').value) / 100;
            const duration = parseFloat(document.getElementById('fogDuration').value);
            app.sendCommand('fog-activate', { density: density, duration: duration });
            app.showNotification('Fog Machine activated', 'success');
        };

        window.deactivateFog = function() {
            app.sendCommand('fog-deactivate', true);
            app.showNotification('Fog Machine deactivated', 'info');
        };

        window.sendGenericParameter = function() {
            const name = document.getElementById('parameterName').value;
            const value = parseFloat(document.getElementById('parameterValue').value);
            app.sendCommand('generic-parameter', { name: name, value: value });
        };

        window.triggerGenericEffect = function() {
            const effectName = document.getElementById('effectName').value;
            app.sendCommand('generic-effect', effectName);
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            app = new CustomDevicesApp();
        });
    </script>
</body>
</html>
